<!doctype html><html lang=en-us data-theme><head><meta charset=utf-8><meta name=HandheldFriendly content="True"><meta name=viewport content="width=device-width,initial-scale=1"><meta name=referrer content="no-referrer-when-downgrade"><title>Categories - Musings on the modern world</title><meta name=description content><link rel=alternate type=application/rss+xml href=https://rickschubert.net/blog/categories/index.xml title="Musings on the modern world"><link rel=icon type=image/x-icon href=https://rickschubert.net/blog/favicon.ico><link rel=apple-touch-icon-precomposed href=https://rickschubert.net/blog/favicon.png><link rel=stylesheet href=https://rickschubert.net/blog/css/style.min.44479278c0a4246362d4713bd4c4ecf1588d47db12651ebf23e7d8e2ded860b3.css integrity="sha256-REeSeMCkJGNi1HE71MTs8ViNR9sSZR6/I+fY4t7YYLM="><meta property="og:title" content="Categories"><meta property="og:description" content><meta property="og:type" content="website"><meta property="og:url" content="https://rickschubert.net/blog/categories/"><meta name=twitter:card content="summary"><meta name=twitter:title content="Categories"><meta name=twitter:description content></head><body><a class=skip-main href=#main>Skip to main content</a><div class=container><header class=common-header><div class=site-header><a class=site-title href=https://rickschubert.net/blog/>Musings on the modern world</a>
<button class=theme-switcher>
🌙</button>
<script>const STORAGE_KEY='user-color-scheme'
const defaultTheme="auto"
let currentTheme
let switchButton
let autoDefinedScheme=window.matchMedia('(prefers-color-scheme: dark)')
const autoChangeScheme=e=>{currentTheme=e.matches?'dark':'light'
document.documentElement.setAttribute('data-theme',currentTheme)
changeButtonText()}
document.addEventListener('DOMContentLoaded',function(){switchButton=document.querySelector('.theme-switcher')
currentTheme=detectCurrentScheme()
if(currentTheme=='dark'){document.documentElement.setAttribute('data-theme','dark')}
if(currentTheme=='auto'){autoChangeScheme(autoDefinedScheme);autoDefinedScheme.addListener(autoChangeScheme);}
changeButtonText()
switchButton.addEventListener('click',switchTheme,false)})
function detectCurrentScheme(){if(localStorage.getItem(STORAGE_KEY)){return localStorage.getItem(STORAGE_KEY)}
if(defaultTheme){return defaultTheme}
if(!window.matchMedia){return 'light'}
if(window.matchMedia('(prefers-color-scheme: dark)').matches){return 'dark'}
return 'light'}
function changeButtonText(){switchButton.textContent=currentTheme=='dark'?"🌞":"🌙"}
function switchTheme(e){if(currentTheme=='dark'){localStorage.setItem(STORAGE_KEY,'light')
document.documentElement.setAttribute('data-theme','light')
currentTheme='light'}else{localStorage.setItem(STORAGE_KEY,'dark')
document.documentElement.setAttribute('data-theme','dark')
currentTheme='dark'}
changeButtonText()}</script></div></header><main id=main tabindex=-1><div class=index-content></div><h1>Categories</h1><ul class=terms></ul></main><footer class=common-footer><a class=rss href=https://rickschubert.net/blog/index.xml><img src=https://rickschubert.net/blog/images/rss.svg> Subscribe to RSS feed</a><nav><a href=https://rickschubert.net/blog/posts/ title=Archive>Archive</a></nav><div class=common-footer-bottom><div class=copyright><p>© Rick Schubert, 2021<br></p></div></div></footer></div></body></html>
